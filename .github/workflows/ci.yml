name: CI

on:
  pull_request:
  push:
    paths-ignore:
      # Documentation
      - 'docs/**'
      - 'mkdocs.yml'
      - 'assets/**'
      # Markdown
      - '*.md'
      # Editor & IDE configs
      - '.vscode/**'
      # Environment examples & secrets config
      - '.env.example'
      - '.editorconfig'
      # Package lock files
      - 'package-lock.yaml'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'

    branches:
      - main

concurrency:
  # Ensure only one CI run per branch/PR at a time
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: 24
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  DATABASE_URL: postgresql://optimizer:optimizer_dev@localhost:55432/agent_optimizer?schema=public

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@739bfe42ca9233c5e6aca07c1a25a9d34aca49b0 # v6.0.7

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies 🛠️
        timeout-minutes: 5
        run: pnpm install --frozen-lockfile --prefer-offline --ignore-scripts

      - name: Cache Prisma Client 💎
        id: cache-prisma
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: node_modules/.prisma
          key: ${{ runner.os }}-prisma-${{ hashFiles('apps/api/prisma/schema.prisma') }}

      - name: Validate & Generate Prisma client 💎
        if: steps.cache-prisma.outputs.cache-hit != 'true'
        run: |
          pnpm --filter @agent-optimizer/api exec prisma validate
          pnpm db:generate

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
