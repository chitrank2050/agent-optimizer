# =============================================================
# Agent Optimizer - Documentation Configuration
#
# MkDocs Material portal for the HighLevel Voice AI Agent Optimizer.
# Mirrors the Meterplex documentation setup while keeping this repo's
# deployment, sandbox, and product-loop documentation focused.
# =============================================================

site_name: Voice AI Agent Optimizer
site_description: HighLevel Voice AI transcript analysis, test generation, and optimization recommendations.
site_author: Chitrank Agnihotri
site_url: https://chitrank2050.github.io/agent-optimizer
repo_url: https://github.com/chitrank2050/agent-optimizer
repo_name: chitrank2050/agent-optimizer
edit_uri: edit/main/docs/

theme:
  name: material

  palette:
    - scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/weather-night
        name: Switch to light mode
    - scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode

  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.top
    - search.highlight
    - search.share
    - content.code.copy
    - toc.follow

  icon:
    repo: fontawesome/brands/github
    logo: material/robot-outline

  font:
    text: Inter
    code: Roboto Mono

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Architecture:
      - Overview: architecture/overview.md
  - Setup:
      - Quick Start: development/quick-start.md
      - Development: development/setup.md
      - Environment Prerequisites: development/environment.md
      - Operational Scripts: development/scripts.md
      - HighLevel Sandbox: highlevel-install.md
      - Deployment: deployment.md
  - Demo:
      - Demo Script: demo-script.md
      - QA and Scope: qa-and-scope.md

extra_css:
  - stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/chitrank2050
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/chitrank-agnihotri/
    - icon: fontawesome/solid/globe
      link: https://chitrankagnihotri.com/

  analytics:
    provider: google
    property: !ENV [GOOGLE_ANALYTICS_ID, '']

copyright: Copyright &copy; 2026 Chitrank Agnihotri
