services:
  postgres:
    # Postgres 16 Alpine is multi-arch and close to managed Postgres defaults.
    image: postgres:18-alpine
    container_name: agent-optimizer-postgres
    restart: unless-stopped
    ports:
      # Host 55432 avoids clashing with a developer's existing local Postgres.
      - '55432:5432'
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-optimizer}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-optimizer_dev}
      POSTGRES_DB: ${POSTGRES_DB:-agent_optimizer}
    networks:
      - agent-optimizer-net
    volumes:
      # Named volume keeps local data durable across container restarts.
      - agent-optimizer-postgres-data:/var/lib/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

networks:
  agent-optimizer-net:
    name: agent-optimizer-internal
    driver: bridge

volumes:
  agent-optimizer-postgres-data:
